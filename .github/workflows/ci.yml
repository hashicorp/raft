name: ci

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["*"]

permissions:
  contents: read

jobs:
  go-fmt-and-vet:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 'stable'
          cache: true
      - name: go fmt
        run: |
          files=$(go fmt ./...)
          if [ -n "$files" ]; then
            echo "The following file(s) do not conform to go fmt:"
            echo "$files"
            exit 1
          fi
      - name: go vet
        run: |
          PACKAGE_NAMES=$(go list ./... | grep -v github.com/hashicorp/raft/fuzzy)
          go vet $PACKAGE_NAMES
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0

  go-test:
    needs: go-fmt-and-vet
    strategy:
      matrix:
        go: ['stable', 'oldstable']
        arch: ['x32', 'x64']
    runs-on: ubuntu-22.04
    env:
      INTEG_TESTS: yes
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ matrix.go }}
          architecture: ${{ matrix.arch }}
          cache: true
      # x86 specific build.
      - if: matrix.arch == 'x32'
        run: |
          sudo apt-get update
          sudo apt-get install gcc-multilib
          go test --tags batchtest ./...
      # x86-64 specific build.
      - if: matrix.arch == 'x64'
        run: go test -race --tags batchtest ./...
  go-test-compat:
    needs: go-test
    strategy:
      matrix:
        go: ['1.20', '1.21', '1.22']
        arch: ['x32', 'x64']
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ matrix.go }}
          architecture: ${{ matrix.arch }}
          cache: true
          submodules: true
      # x86 specific build.
      - if: matrix.arch == 'x32'
        run: |
          sudo apt-get update
          sudo apt-get install gcc-multilib
          git submodule update --init --recursive
          cd raft-compat
          go mod tidy
          go test -v -coverpkg=./... ./... -coverprofile="${{ github.workspace }}/coverage.out"
      # x86-64 specific build.
      - if: matrix.arch == 'x64'
        run: |
          git submodule update --init --recursive
          cd raft-compat
          go mod tidy
          go test -race -v -coverpkg=./... ./... -coverprofile="${{ github.workspace }}/coverage.out"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: "${{ github.workspace }}/coverage.out"
          name: coverage-report-${{matrix.go}}-${{matrix.arch}}
